services:
  postgres:
    image: postgres:16-alpine
    container_name: foe_analytics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foe_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-foe_analytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foe_analytics_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - foe_analytics_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-foe_analytics} -d ${POSTGRES_DB:-foe_analytics}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  foe_analytics_postgres_data:

